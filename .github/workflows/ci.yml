name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  quality:
    name: Rust quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40
        with:
          components: rustfmt, clippy

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # PRs restore the default-branch cache but do not create short-lived,
          # branch-scoped copies that compete for GitHub's cache quota.
          cache-on-failure: true
          cache-bin: false
          save-if: ${{ github.event_name != 'pull_request' }}
          shared-key: ci-quality

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --locked --all-targets

      - name: Check all feature targets
        run: cargo check --locked --all-targets --all-features

      - name: Check minimal WASIX targets
        run: cargo check --locked --no-default-features --features wasix --all-targets

      - name: Lint all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Lint all feature targets
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Lint minimal WASIX targets
        run: cargo clippy --locked --no-default-features --features wasix --all-targets -- -D warnings

      - name: Test all targets
        run: cargo test --locked --all-targets

      - name: Test all feature targets
        run: cargo test --locked --all-targets --all-features

      - name: Test all feature documentation
        run: cargo test --locked --doc --all-features

      - name: Build all feature documentation without warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features

      - name: Verify the crates.io source package
        run: cargo package --locked

      - name: Smoke-test a clean packaged consumer
        env:
          # Keep the generated consumer source isolated while reusing the
          # dependency artifacts built by the checks above.
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: scripts/package-consumer-smoke.sh

  checkpoint-migration:
    name: WASIX checkpoint migration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40

      - name: Restore WASIX checkpoint build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
          save-if: ${{ github.event_name != 'pull_request' }}
          shared-key: ci-wasix-checkpoint

      - name: Snapshot on source worker and restore on destination worker
        run: scripts/checkpoint-migration-ci.sh

  supply-chain:
    name: Dependency policy and advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40

      - name: Restore Rust audit cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: true
          cache-targets: false
          save-if: ${{ github.event_name != 'pull_request' }}
          shared-key: ci-audit

      - name: Check licenses, sources, bans, and advisories
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --all-features

      - name: Install pinned RustSec advisory auditor
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Run the RustSec advisory audit
        run: cargo audit

      - name: Check fuzz-package dependency policy
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --all-features --config fuzz/deny.toml
          manifest-path: ./fuzz/Cargo.toml

  fixtures:
    name: Reproducible WASI fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip1, wasm32-wasip2

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-bin: false
          save-if: ${{ github.event_name != 'pull_request' }}
          shared-key: ci-fixtures
          workspaces: |
            . -> target
            benchmarks/fixtures/json-http-tool -> target
            benchmarks/fixtures/p2-http-hello -> target

      - name: Restore pinned benchmark tools
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .benchmark-tools
          key: benchmark-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('benchmarks/bootstrap_tools.py') }}

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Rebuild standard fixtures
        run: |
          uv run benchmarks/bootstrap_tools.py
          uv run benchmarks/build_fixtures.py

      - name: Verify fixtures are reproducible
        run: >-
          git diff --exit-code --
          tests/fixtures/json-http-tool.component.wasm
          tests/fixtures/oversized-output.component.wasm
          tests/fixtures/p2-http-hello.component.wasm
          tests/fixtures/wasix-checkpoint-number.wasm
