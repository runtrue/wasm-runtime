name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated release tag, for example v0.1.0
        required: true
        type: string
      publish_crate:
        description: Publish the source package to crates.io
        required: true
        default: false
        type: boolean
      publish_confirmation:
        description: To publish publicly, enter "publish <tag>" exactly
        required: false
        default: ""
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Verify and assemble release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Verify explicit public publication confirmation
        if: inputs.publish_crate
        env:
          CONFIRMATION: ${{ inputs.publish_confirmation }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: test "$CONFIRMATION" = "publish $RELEASE_TAG"

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          cache-on-failure: true
          cache-bin: true
          shared-key: release

      - name: Verify source, tests, docs, version, and package
        run: scripts/release-check.sh "${{ inputs.tag }}"

      - name: Install pinned SBOM generator
        run: cargo install cargo-cyclonedx --locked --version 0.5.9

      - name: Assemble release bundle
        id: package
        shell: bash
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"
          cargo cyclonedx --format json --spec-version 1.5 \
            --override-filename "runtrue-wasm-runtime-${version}.cdx"
          mkdir -p dist
          cp "target/package/runtrue-wasm-runtime-${version}.crate" dist/
          cp "runtrue-wasm-runtime-${version}.cdx.json" dist/
          chmod 0644 dist/*
          (cd dist && sha256sum runtrue-wasm-runtime-* > SHA256SUMS)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Upload verified release bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: runtrue-wasm-runtime-${{ steps.package.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish approved release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Install pinned Rust toolchain
        if: inputs.publish_crate
        uses: dtolnay/rust-toolchain@3a8b2ad3ea1212417907ff0e1b3d0c4e121bef40
        with:
          toolchain: 1.94.0

      - name: Download verified release bundle
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: runtrue-wasm-runtime-${{ needs.build.outputs.version }}
          path: dist

      - name: Create or refresh draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --draft \
              --title "runtrue-wasm-runtime $RELEASE_VERSION" --generate-notes
          fi

      - name: Authenticate to crates.io with trusted publishing
        if: inputs.publish_crate
        id: crates_io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish source package to crates.io
        if: inputs.publish_crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io.outputs.token }}
        run: cargo publish --locked

      - name: Attest release bundle provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag }}" --draft=false
